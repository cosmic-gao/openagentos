# OpenAgentOS 全栈：postgres + redis（Aegra 依赖）+ OpenSandbox 服务器 + app。Linux 与
# Windows Docker Desktop（WSL2）通用。连接配置见 .env（cp .env.example .env）。
services:
  # ── Aegra 依赖：PostgreSQL（持久化/检查点/pgvector）──
  postgres:
    image: pgvector/pgvector:pg14
    container_name: ${PROJECT_NAME:-openagentos}-postgres
    restart: unless-stopped
    env_file: [.env]
    command:
      - "-p"
      - "${POSTGRES_PORT:-15432}"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-400}"   # 须 ≥ 各实例 DB 池连接之和(单实例~150)
      - "-c"
      - "shared_buffers=512MB"
    ports:
      - "${POSTGRES_PORT:-15432}:${POSTGRES_PORT:-15432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p ${POSTGRES_PORT:-15432}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: &logging
      driver: json-file
      options: {max-size: "20m", max-file: "5"}
    deploy:
      resources:
        limits: {cpus: "2", memory: "3g"}   # 撑 max_connections=400 + shared_buffers;按机器/负载调整

  # ── Aegra 依赖：Redis（任务队列 / SSE pub-sub / 崩溃恢复）──
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-openagentos}-redis
    restart: unless-stopped
    # requirepass 保护发布到宿主的端口;密码取 .env 的 REDIS_PASSWORD。
    command: ["redis-server", "--port", "${REDIS_PORT:-16379}", "--requirepass", "${REDIS_PASSWORD:?请在 .env 设置 REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-16379}:${REDIS_PORT:-16379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_PORT:-16379} -a \"${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *logging
    deploy:
      resources:
        limits: {cpus: "0.5", memory: "512m"}   # 单机部署资源上限,按机器/负载调整

  # ── 一次性 init：把 AGENTOS_WORKSPACE_HOST 注入 sandbox.toml 的 allowed_host_paths ──
  # 该配置不支持环境变量，故从模板渲染出 config 写入 sandbox_config 卷（单引号字面量兼容 Windows 路径）。
  sandbox-config:
    image: busybox:1.36
    container_name: ${PROJECT_NAME:-openagentos}-sandbox-config
    environment:
      AGENTOS_WORKSPACE_HOST: ${AGENTOS_WORKSPACE_HOST:?请在 .env 设置 AGENTOS_WORKSPACE_HOST}
    volumes:
      - ./sandbox.toml:/tmpl/sandbox.toml:ro
      - sandbox_config:/out
    command:
      - /bin/sh
      - -c
      - |
        cp /tmpl/sandbox.toml /out/config.toml
        printf "\n[storage]\nallowed_host_paths = ['%s']\n" "$$AGENTOS_WORKSPACE_HOST" >> /out/config.toml

  # ── OpenSandbox 服务器：经 docker.sock 拉起/管理沙箱容器 ──
  opensandbox-server:
    image: opensandbox/server:latest
    container_name: ${PROJECT_NAME:-openagentos}-opensandbox
    restart: unless-stopped
    ports:
      - "${OPEN_SANDBOX_PORT:-8080}:8080"
    volumes:
      # Docker Desktop（Win/mac）与 Linux 都在此路径暴露守护进程 socket。
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox_config:/etc/opensandbox:ro
    environment:
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
      OPENSANDBOX_INSECURE_SERVER: "YES"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      sandbox-config: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *logging

  # ── 预拉沙箱运行时镜像 ──
  # 沙箱基础镜像与 opensandbox/execd 不是 compose service,而是 opensandbox 经 docker.sock
  # 在首次建沙箱时才按需拉;拉取耗时会超过 create 的读超时 → SandboxInternalException。
  # 这里在 up 时先拉好(仅缺失才拉,离线且已在则跳过),app 等它完成再放行。
  sandbox-images:
    image: docker:cli
    container_name: ${PROJECT_NAME:-openagentos}-sandbox-images
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SANDBOX_IMAGE: ${AGENTOS_SANDBOX_IMAGE:-python:3.12-slim}
      # 须与 opensandbox/server 期望的 execd 版本一致;升级 server 后同步改这里。
      EXECD_IMAGE: ${SANDBOX_EXECD_IMAGE:-opensandbox/execd:v1.0.19}
    command:
      - sh
      - -c
      - |
        set -e
        for img in "$$SANDBOX_IMAGE" "$$EXECD_IMAGE"; do
          docker image inspect "$$img" >/dev/null 2>&1 || docker pull "$$img"
        done

  # ── OpenAgentOS app（Aegra 托管 agentos 图）──
  openagentos:
    image: "openagentos:${TAG:-latest}"
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: ${PROJECT_NAME:-openagentos}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    # 默认 0:0(root)，与沙箱一致，bind 外挂盘直接可写；收紧为非 root 见 .env。
    user: "${AGENTOS_UID:-0}:${AGENTOS_GID:-0}"
    env_file: [.env]
    environment:
      # compose 内网寻址（覆盖 .env 的本地调试值）。
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:${REDIS_PORT:-16379}/0
      OPEN_SANDBOX_DOMAIN: opensandbox-server:8080
      PORT: ${PORT:-2026}
      AGENTOS_WORKSPACE: /workspace-data
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    volumes:
      # app 与沙箱共用此宿主目录；create_host_path:false 使外挂盘/目录缺失时启动失败，不误建空目录。
      - type: bind
        source: ${AGENTOS_WORKSPACE_HOST:?请在 .env 设置 AGENTOS_WORKSPACE_HOST}
        target: /workspace-data
        bind:
          create_host_path: false
    # 未挂载保护：哨兵（AGENTOS_WORKSPACE_SENTINEL,文件或目录）不在则拒启，防外挂盘没挂好时写入系统盘；留空跳过。
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$AGENTOS_WORKSPACE_SENTINEL" ] && [ ! -e "$$AGENTOS_WORKSPACE/$$AGENTOS_WORKSPACE_SENTINEL" ]; then
          echo "[fatal] 工作区哨兵 '$$AGENTOS_WORKSPACE_SENTINEL' 不在 $$AGENTOS_WORKSPACE 下——外挂盘未挂载？" >&2
          exit 1
        fi
        exec aegra serve
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      opensandbox-server: {condition: service_started}
      sandbox-images: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os; urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','2026')+'/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *logging
    deploy:
      resources:
        limits: {cpus: "4", memory: "6g"}   # 100 并发 run 目标;单 uvicorn=单事件循环,加核收益递减,再上量走横向加副本

volumes:
  postgres_data:
  redis_data:
  sandbox_config:
