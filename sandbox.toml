# OpenSandbox 服务器配置（docker 运行时）。挂进 opensandbox-server 容器
# （见 docker-compose.yml）。改动后需重启该服务才生效。
[server]
host = "0.0.0.0"
port = 8080

[log]
level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.19"

[docker]
# 沙箱加入 compose 网络（openagentos_default），与 app/server 同网。
network_mode = "openagentos_default"
# client 连沙箱的地址；配合 opensandbox-server 的 host-gateway，Linux 与 Docker Desktop 通用（防火墙拦则改宿主 IP）。
host_ip = "host.docker.internal"
# 每沙箱 publish 2~3 个宿主端口；避开 Windows 保留端口段（默认 40000-60000 会撞），Linux 亦空闲。
port_range_min = 40000
port_range_max = 47000
drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
no_new_privileges = true
pids_limit = 4096

[ingress]
mode = "direct"

# 按访问续期：沙箱在窗口内被访问就保活，空闲超过 AGENTOS_SANDBOX_TTL 才销毁；min_interval 为续期冷却。
[renew_intent]
enabled = true
min_interval_seconds = 60

[store]
type = "sqlite"
path = "/root/.opensandbox/opensandbox.db"

# [storage].allowed_host_paths 由 compose 的 sandbox-config 从 .env 的 AGENTOS_WORKSPACE_HOST
# 注入（单一真源），此处不写死。不经 compose 直接运行时手动追加：
#   [storage]
#   allowed_host_paths = ['/abs/path/to/workspace']
